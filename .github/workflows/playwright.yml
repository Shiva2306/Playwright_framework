pipeline {
    agent any

    tools {
        // This MUST match the name you added in Jenkins Global Tool Configuration
        allure 'allure'
    }

    stages {

        stage('Checkout') {
            steps {
                git 'https://github.com/Shiva2306/Playwright_framework.git'
            }
        }

        stage('Install Dependencies') {
            steps {
                bat 'npm install'
                bat 'npx playwright install'
            }
        }

        stage('Run Regression Tests') {
            steps {
                bat 'npx playwright test --grep @regression --headed --reporter=line,allure-playwright'
            }
        }

        stage('Generate Allure Report') {
            steps {
                allure includeProperties: false,
                       jdk: '',
                       results: [[path: 'allure-results']]
            }
        }
    }

    post {
        always {
            echo 'Execution Completed'
        }
        success {
            echo 'Tests Passed ✅'
        }
        failure {
            echo 'Tests Failed ❌'
        }
    }
}